[defaults]
inventory = /mnt/c/Users/marti/Desktop/Cluster/code/hosts.ini
host_key_checking = False
# Use the PC orchestration key (id_ed25519). Its .pub was regenerated on
# 2026-07-13 to match the private key after a mismatch was discovered.
private_key_file = /home/marti/.ssh/id_ed25519
retry_files_enabled = False
interpreter_python = /usr/bin/python3

[ssh_connection]
# Auto-accept NEW host keys (post-reflash) but still verify known ones.
ssh_args = -o StrictHostKeyChecking=accept-new -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
