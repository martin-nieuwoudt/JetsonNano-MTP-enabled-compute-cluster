# Bare-Metal Networking Parameters for Jetson Nano Cluster
# From: raw refinements.md — Section: Bare-Metal OS Tweak for Network-Memory Synchronisation
# Apply to /etc/sysctl.conf across all Nanos to minimize latency spikes
# when pushing attention matrix results over Gigabit Ethernet.

# Increase the maximum number of open files and system descriptors
fs.file-max = 2097152

# Allocate substantial core network memory buffers to avoid transmission drops
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# Increase maximum network packet queue length to handle high-context spikes
net.core.netdev_max_backlog = 10000

# Disable TCP slow start after idle periods to keep the 1GbE lanes primed
net.ipv4.tcp_slow_start_after_idle = 0

# Additional: TCP keepalive for fast node-drop detection
net.ipv4.tcp_keepalive_time = 15