# SonarQube / SonarCloud exclusions — suppress known false positives
# for this project's intentional design patterns (trusted-LAN HTTP,
# static private-IP topology constants, fixed-seed reproducible RNG).

# ---- Rule: python:S5332 (HTTP is insecure, use HTTPS) ----
# All HTTP URLs in these files target loopback or a trusted isolated LAN
# segment (192.168.50.0/24). No credentials or PII are served.
sonar.issue.ignore.multicriteria=e_http_telemetry,e_http_server

sonar.issue.ignore.multicriteria.e_http_telemetry.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e_http_telemetry.resourceKey=code/cluster_telemetry.py

sonar.issue.ignore.multicriteria.e_http_server.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e_http_server.resourceKey=code/cluster_server.py

# ---- Rule: python:S1313 (hardcoded IP) ----
# 192.168.50.150 is a fixed private-LAN topology constant, not user input.
sonar.issue.ignore.multicriteria=e_ip_telemetry,e_ip_config

sonar.issue.ignore.multicriteria.e_ip_telemetry.ruleKey=python:S1313
sonar.issue.ignore.multicriteria.e_ip_telemetry.resourceKey=code/cluster_telemetry.py

sonar.issue.ignore.multicriteria.e_ip_config.ruleKey=python:S1313
sonar.issue.ignore.multicriteria.e_ip_config.resourceKey=code/mcp/cluster_config.py

# ---- Rule: python:S2245 (pseudorandom RNG) ----
# Fixed-seed random.Random for reproducible ensemble partitioning.
sonar.issue.ignore.multicriteria.e_rng.ruleKey=python:S2245
sonar.issue.ignore.multicriteria.e_rng.resourceKey=code/mcp/cluster_config.py

# ---- Rule: javascript:S5332 (HTTP in JS, embedded in Python template) ----
# The fetch() call uses a fixed /api/ path, not user-supplied.
sonar.issue.ignore.multicriteria.e_js_http.ruleKey=javascript:S5332
sonar.issue.ignore.multicriteria.e_js_http.resourceKey=code/cluster_telemetry.py
