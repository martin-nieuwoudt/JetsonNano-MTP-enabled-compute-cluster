<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="com.canonical.UbuntuAdvantage"/>
  </policy>
  <policy context="default">
    <allow send_destination="com.canonical.UbuntuAdvantage"
           send_interface="com.canonical.UbuntuAdvantage" send_type="method_call"/>
  </policy>
</busconfig>
