<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Our well-known bus type, do not change this -->
  <type>system</type>

  <!-- Run as special user -->
  <user>messagebus</user>

  <!-- Fork into daemon mode -->
  <fork/>

  <!-- Write a pid file -->
  <pidfile>/run/dbus/pid</pidfile>

  <!-- Enable logging to syslog -->
  <syslog/>

  <!-- Only allow socket credentials to be sent to the bus -->
  <auth>EXTERNAL</auth>

  <!-- Only listen on a local socket. (abstract=/path or unix:path=/path) -->
  <listen>unix:path=/run/dbus/system_bus_socket</listen>

  <policy context="default">
    <!-- All users can connect to system bus -->
    <allow user="*"/>

    <!-- Holes must be punched in service-specific policy for
         name ownership and sending method calls -->
    <deny own="*"/>
    <deny send_type="method_call"/>
  </policy>

  <!-- Config files are placed here that among other things, punch
       holes in the above policy for specific services. -->
  <includedir>system.d</includedir>

  <includedir>system.conf.d</includedir>

  <!-- This is enabled if x11-apps is installed; gnome applications
       will use it to determine which display to use if DISPLAY is
       not set. -->
  <servicedir>/usr/share/dbus-1/system-services</servicedir>

  <!-- ipython and other interactive tools want to use bus name
       starting with "org.freedesktop" so we blacklist them -->
  <policy user="root">
    <allow own="org.freedesktop.*"/>
    <allow send_destination="org.freedesktop.*"/>
    <allow receive_sender="org.freedesktop.*"/>
  </policy>

  <!-- allow root to send to everything -->
  <policy context="default">
    <allow send_destination="org.freedesktop.systemd1"/>
    <allow receive_sender="org.freedesktop.systemd1"/>
  </policy>
</busconfig>
